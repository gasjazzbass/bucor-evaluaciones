<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>Bucor · Evaluación de Natación</title>
  <meta name="description" content="Fundación Educativa y Deportiva Bucor — evaluación de aprendizaje en natación">

  <!-- PWA: instalable como app autónoma -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0E1E35">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS: abrir en modo standalone (sin barra del navegador) con ícono propio -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bucor">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div id="screen-login" class="login-bg">
    <form id="form-login" class="login-card">
      <img class="mascota" src="img/mascota.png" alt="" onerror="this.remove()">
      <img class="logo-login" src="img/logo-bucor-full.png" alt="Bucor · Fundación Educativa y Deportiva">
      <h1>Evaluación de Natación</h1>
      <label class="field"><span>Email</span>
        <input type="email" id="login-email" autocomplete="username" required></label>
      <label class="field"><span>Contraseña</span>
        <input type="password" id="login-pass" autocomplete="current-password" required></label>
      <button class="btn primary block" type="submit" id="login-btn">Ingresar</button>
      <p id="login-msg" class="small" style="color:var(--rojo); text-align:center; margin:10px 0 0"></p>
    </form>
  </div>

  <!-- ===== APP ===== -->
  <div id="screen-app" class="hidden">
    <div class="appbar">
      <div class="brand">
        <img src="img/mascota.png" alt="" onerror="this.remove()">
        <img class="logo-marca" src="img/logo-bucor-wordmark.png" alt="Bucor">
        <small>Evaluación de Natación</small>
      </div>
      <div class="spacer"></div>
      <div class="who"><b id="who-name">—</b><span id="who-role" class="small"></span></div>
      <button class="btn ghost sm" id="btn-logout" style="color:#fff;border-color:rgba(255,255,255,.5)">Salir</button>
    </div>

    <nav class="tabs" id="tabs"></nav>
    <main id="view" class="wrap"></main>
  </div>

  <div id="toast"></div>
  <div id="modal-root"></div>

  <!-- Supabase + app -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    // Habilita "Instalar app" (PWA autónoma, con ícono propio, sin barra del navegador)
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
</html>
