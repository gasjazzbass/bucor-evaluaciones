<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>Bucor · Evaluación de Natación</title>
  <meta name="description" content="Fundación Educativa y Deportiva Bucor — evaluación de aprendizaje en natación">

  <!-- PWA: instalable como app autónoma -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0E1E35">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS: abrir en modo standalone (sin barra del navegador) con ícono propio -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bucor">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div id="screen-login" class="login-bg">
    <form id="form-login" class="login-card">
      <img class="mascota" src="img/mascota.png" alt="" onerror="this.remove()">
      <img class="logo-login" src="img/logo-bucor-full.png" alt="Bucor · Fundación Educativa y Deportiva">
      <h1>Evaluación de Natación</h1>

      <button type="button" class="btn google block" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continuar con Google
      </button>
      <div class="divisor"><span>o con tu email</span></div>

      <label class="field"><span>Email</span>
        <input type="email" id="login-email" autocomplete="username" required></label>
      <label class="field"><span>Contraseña</span>
        <input type="password" id="login-pass" autocomplete="current-password" required></label>
      <button class="btn primary block" type="submit" id="login-btn">Ingresar</button>
      <p id="login-msg" class="small" style="color:var(--rojo); text-align:center; margin:10px 0 0"></p>
    </form>
  </div>

  <!-- ===== APP ===== -->
  <div id="screen-app" class="hidden">
    <div class="appbar">
      <div class="brand">
        <img src="img/mascota.png" alt="" onerror="this.remove()">
        <img class="logo-marca" src="img/logo-bucor-wordmark.png" alt="Bucor">
        <small>Evaluación de Natación</small>
      </div>
      <div class="spacer"></div>
      <button class="bell" id="btn-notif" title="Notificaciones" aria-label="Notificaciones">
        🔔<span class="bcount hidden" id="notif-count">0</span>
      </button>
      <button class="acct" id="btn-acct" title="Cuenta" aria-label="Cuenta"><span id="acct-ini">–</span></button>
    </div>

    <nav class="tabs" id="tabs"></nav>
    <main id="view" class="wrap"></main>
  </div>

  <div id="toast"></div>
  <div id="modal-root"></div>

  <!-- Pantalla de bienvenida (saludo + frase, se desvanece sola) -->
  <div id="welcome" class="hidden">
    <div class="welcome-inner">
      <img src="img/mascota.png" alt="" class="welcome-mascota" onerror="this.remove()">
      <h1 id="welcome-hola">¡Hola!</h1>
      <p id="welcome-frase"></p>
    </div>
  </div>

  <!-- Supabase + app -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    // Habilita "Instalar app" (PWA autónoma, con ícono propio, sin barra del navegador)
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
</html>
