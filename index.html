<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BUCOR · Evaluación de Natación</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏊</text></svg>">
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div id="screen-login" class="login-bg">
    <form id="form-login" class="login-card">
      <img class="mascota" src="img/mascota.png" alt="" onerror="this.remove()">
      <div class="wordmark">bucor</div>
      <h1>Evaluación de Natación</h1>
      <p class="sub">Fundación Educativa y Deportiva Bucor</p>
      <label class="field"><span>Email</span>
        <input type="email" id="login-email" autocomplete="username" required></label>
      <label class="field"><span>Contraseña</span>
        <input type="password" id="login-pass" autocomplete="current-password" required></label>
      <button class="btn primary block" type="submit" id="login-btn">Ingresar</button>
      <p id="login-msg" class="small" style="color:var(--rojo); text-align:center; margin:10px 0 0"></p>
    </form>
  </div>

  <!-- ===== APP ===== -->
  <div id="screen-app" class="hidden">
    <div class="appbar">
      <div class="brand"><img src="img/mascota.png" alt="" onerror="this.remove()">bucor <small>Evaluación de Natación</small></div>
      <div class="spacer"></div>
      <div class="who"><b id="who-name">—</b><span id="who-role" class="small"></span></div>
      <button class="btn ghost sm" id="btn-logout" style="color:#fff;border-color:rgba(255,255,255,.5)">Salir</button>
    </div>

    <nav class="tabs" id="tabs"></nav>
    <main id="view" class="wrap"></main>
  </div>

  <div id="toast"></div>
  <div id="modal-root"></div>

  <!-- Supabase + app -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
